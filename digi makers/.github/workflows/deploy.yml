name: Deploy Agency to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'digi makers/agency/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci
        working-directory: digi makers/agency

      - name: Build with Next.js
        run: npm run build
        working-directory: digi makers/agency

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./digi makers/agency/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
